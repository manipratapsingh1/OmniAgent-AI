version: '3.8'

# Production Docker Compose — points to omniagent-ai/ subdirectory
# Usage: docker compose up -d

services:
  db:
    image: postgres:16-alpine
    container_name: omniagent_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omniai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omniai_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-omniai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omniai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    networks:
      - omniagent_network

  redis:
    image: redis:7-alpine
    container_name: omniagent_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    networks:
      - omniagent_network

  chroma:
    image: chromadb/chroma:0.5.5
    container_name: omniagent_chroma
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/v1/heartbeat\")' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    networks:
      - omniagent_network

  ollama:
    image: ollama/ollama:latest
    container_name: omniagent_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
    networks:
      - omniagent_network

  backend:
    build:
      context: ./omniagent-ai/backend
      dockerfile: Dockerfile
    container_name: omniagent_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-omniai}:${POSTGRES_PASSWORD:-omniai_secure_password}@db:5432/${POSTGRES_DB:-omniai}
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./omniagent-ai/backend/uploads:/app/uploads
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/healthz\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - omniagent_network

  worker:
    build:
      context: ./omniagent-ai/backend
      dockerfile: Dockerfile
    container_name: omniagent_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-omniai}:${POSTGRES_PASSWORD:-omniai_secure_password}@db:5432/${POSTGRES_DB:-omniai}
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./omniagent-ai/backend/uploads:/app/uploads
    command: ["python", "start_rq_worker.py"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - omniagent_network

  frontend:
    build:
      context: ./omniagent-ai/frontend
      dockerfile: Dockerfile
    container_name: omniagent_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    networks:
      - omniagent_network

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: omniagent_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    networks:
      - omniagent_network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:11.1.0
    container_name: omniagent_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    networks:
      - omniagent_network
    profiles:
      - monitoring

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  ollama_data:

networks:
  omniagent_network:
    driver: bridge
